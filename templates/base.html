<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Finder - Top Cards under ₹20,000</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='/css/style.css') }}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark shadow-sm sticky-top">
        <div class="container py-1">
            <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" href="/" aria-label="GPU Finder Home">
                <span class="rounded-circle bg-info-subtle text-dark px-2 py-1 small fw-bold">GF</span>
                <span>GPU Finder</span>
            </a>
            <div class="d-flex">
                <button id="refreshBtn" class="btn btn-sm btn-outline-light px-3" aria-label="Refresh product data">
                    Refresh Data
                </button>
            </div>
        </div>
    </nav>

    <main class="container my-4 my-md-5" role="main">
        {% block content %}{% endblock %}
    </main>

    <footer class="py-4 mt-5 border-top bg-white">
        <div class="container">
            <p class="text-center text-muted mb-0 small">
                &copy; 2025 GPU Finder. All rights reserved.
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='/js/app.js') }}"></script>
</body>
</html>
